    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pea-purple: #6B21A8;
            --pea-emerald: #059669;
        }
        body {
            font-family: 'Inter', 'Kanit', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
        /* QR Reader enhancements */
        #reader, #vehicle-reader {
            width: 100% !important;
            border: none !important;
            background: #000 !important;
        }
        #reader video, #vehicle-reader video {
            border-radius: 1.5rem !important;
            object-fit: cover !important;
        }
        /* Mobile safe area padding */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
